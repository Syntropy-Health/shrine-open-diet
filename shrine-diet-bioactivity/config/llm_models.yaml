# Pinned LLM model snapshots for AG2 (Subsystem H clinical research team).
# Default routes through OpenRouter (free tier, OpenAI-compatible).
# Reproducibility relies on cache_seed + temperature=0 in agents/llm_config.py.

default:
  provider: openai          # OpenAI-compatible (OpenRouter)
  base_url: https://openrouter.ai/api/v1
  model: nvidia/nemotron-3-nano-30b-a3b:free
  api_key_env: OPENROUTER_API_KEY

